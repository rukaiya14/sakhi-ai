<!-- Reusable Header Component with Voice Command, AI Mentor, and Language Selector -->
<!-- Copy this into the <header class="header"> section of each page -->

<div class="header-right" style="display: flex; align-items: center; gap: 20px;">
    <!-- Voice Command Button -->
    <button class="voice-btn" id="voiceBtn" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; transition: all 0.3s; box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);">
        <i class="fas fa-microphone"></i>
        <span>Voice Command</span>
    </button>
    
    <!-- AI Mentor Button -->
    <button class="ai-mentor-btn" onclick="window.location.href='dashboard.html#ai-sakhi'" style="background: linear-gradient(135deg, #f093fb, #f5576c); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; transition: all 0.3s; box-shadow: 0 2px 10px rgba(240, 147, 251, 0.3);">
        <i class="fas fa-robot"></i>
        <span>AI Mentor</span>
    </button>
    
    <!-- Language Selector -->
    <select id="languageSelector" style="padding: 10px 15px; border: 2px solid #e0e0e0; border-radius: 25px; font-weight: 600; cursor: pointer; background: white; color: #2c3e50; transition: all 0.3s;">
        <option value="en">English</option>
        <option value="hi">हिंदी</option>
        <option value="mr">मराठी</option>
        <option value="bn">বাংলা</option>
    </select>
</div>

<!-- JavaScript for Header Buttons (add before closing </script> tag) -->
<script>
// Voice Command and Language Selector functionality
const voiceBtn = document.getElementById('voiceBtn');
if (voiceBtn) {
    voiceBtn.addEventListener('mouseenter', function() {
        this.style.transform = 'scale(1.05)';
        this.style.boxShadow = '0 4px 20px rgba(102, 126, 234, 0.5)';
    });
    voiceBtn.addEventListener('mouseleave', function() {
        this.style.transform = 'scale(1)';
        this.style.boxShadow = '0 2px 10px rgba(102, 126, 234, 0.3)';
    });
    voiceBtn.addEventListener('click', function() {
        alert('Voice Command feature coming soon!');
    });
}

const aiMentorBtn = document.querySelector('.ai-mentor-btn');
if (aiMentorBtn) {
    aiMentorBtn.addEventListener('mouseenter', function() {
        this.style.transform = 'scale(1.05)';
        this.style.boxShadow = '0 4px 20px rgba(240, 147, 251, 0.5)';
    });
    aiMentorBtn.addEventListener('mouseleave', function() {
        this.style.transform = 'scale(1)';
        this.style.boxShadow = '0 2px 10px rgba(240, 147, 251, 0.3)';
    });
}

const languageSelector = document.getElementById('languageSelector');
if (languageSelector) {
    languageSelector.addEventListener('change', function() {
        const langNames = { 'en': 'English', 'hi': 'हिंदी', 'mr': 'मराठी', 'bn': 'বাংলা' };
        alert(`Language changed to ${langNames[this.value]}`);
    });
    languageSelector.addEventListener('focus', function() {
        this.style.borderColor = '#667eea';
    });
    languageSelector.addEventListener('blur', function() {
        this.style.borderColor = '#e0e0e0';
    });
}
</script>
