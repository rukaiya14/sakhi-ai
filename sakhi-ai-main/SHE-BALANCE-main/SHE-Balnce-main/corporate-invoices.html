<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices - SheBalance Corporate Portal</title>
    <link rel="stylesheet" href="corporate-invoices.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span>SheBalance</span>
                <span class="corporate-badge">Corporate Portal</span>
            </div>
            <div class="nav-menu">
                <a href="corporate-dashboard.html" class="nav-link">Browse Artisans</a>
                <a href="corporate-bulk-orders.html" class="nav-link">Bulk Orders</a>
                <a href="corporate-contracts.html" class="nav-link">Contracts</a>
                <a href="corporate-invoices.html" class="nav-link active">Invoices</a>
                <a href="index.html" class="nav-link">Home</a>
            </div>
            <div class="nav-actions">
                <button class="btn-icon" onclick="toggleNotifications()">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge">5</span>
                </button>
                <div class="user-profile" onclick="toggleUserMenu()">
                    <div class="user-avatar">
                        <i class="fas fa-building"></i>
                    </div>
                    <span class="user-name" id="userName">Loading...</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- User Menu Dropdown -->
    <div id="userMenu" class="user-menu">
        <div class="menu-item" onclick="window.location.href='corporate-profile.html'">
            <i class="fas fa-user-circle"></i>
            <span>Company Profile</span>
        </div>
        <div class="menu-item" onclick="window.location.href='#settings'">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
        </div>
        <div class="menu-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="page-container">
        <div class="page-header">
            <div class="header-content">
                <button class="btn-back" onclick="window.location.href='corporate-dashboard.html'">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </button>
                <h1><i class="fas fa-file-invoice"></i> Invoices</h1>
                <p>Track and manage your payment invoices</p>
            </div>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterInvoices('all')">
                <i class="fas fa-list"></i> All Invoices
            </button>
            <button class="filter-btn" onclick="filterInvoices('paid')">
                <i class="fas fa-check-circle"></i> Paid
            </button>
            <button class="filter-btn" onclick="filterInvoices('pending')">
                <i class="fas fa-clock"></i> Pending
            </button>
            <button class="filter-btn" onclick="filterInvoices('overdue')">
                <i class="fas fa-exclamation-circle"></i> Overdue
            </button>
        </div>

        <!-- Invoices List -->
        <div class="invoices-container" id="invoicesContainer">
            <!-- Invoices will be loaded here -->
        </div>
    </div>

    <!-- Invoice Details Modal -->
    <div id="invoiceDetailsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-file-invoice"></i> Invoice Details</h2>
                <button class="modal-close" onclick="closeModal('invoiceDetailsModal')">&times;</button>
            </div>
            <div class="modal-body" id="invoiceDetailsContent">
                <!-- Content will be loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- Download Progress Modal -->
    <div id="downloadModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2><i class="fas fa-download"></i> Downloading Invoice</h2>
                <button class="modal-close" onclick="closeModal('downloadModal')">&times;</button>
            </div>
            <div class="modal-body" id="downloadContent">
                <!-- Content will be loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2><i class="fas fa-credit-card"></i> Make Payment</h2>
                <button class="modal-close" onclick="closeModal('paymentModal')">&times;</button>
            </div>
            <div class="modal-body" id="paymentContent">
                <!-- Content will be loaded dynamically -->
            </div>
        </div>
    </div>

    <script src="corporate-invoices.js"></script>
</body>
</html>
