<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Integration Example - SHE-BALANCE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .section {
            margin-bottom: 40px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-info {
            background: #3b82f6;
            color: white;
        }

        .btn-info:hover {
            background: #2563eb;
        }

        .output {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            max-height: 400px;
            overflow-y: auto;
        }

        .output pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #333;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .status.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #374151;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗄️ SHE-BALANCE Database Integration</h1>
        <p class="subtitle">Test and explore database operations</p>

        <!-- Database Status -->
        <div class="section">
            <h2>📊 Database Status</h2>
            <p>Environment: <span class="status info" id="dbEnvironment">Local</span></p>
            <p>Connection: <span class="status success" id="dbConnection">Connected</span></p>
            
            <div class="stats" id="dbStats">
                <div class="stat-card">
                    <h3 id="userCount">0</h3>
                    <p>Total Users</p>
                </div>
                <div class="stat-card">
                    <h3 id="artisanCount">0</h3>
                    <p>Artisans</p>
                </div>
                <div class="stat-card">
                    <h3 id="productCount">0</h3>
                    <p>Products</p>
                </div>
                <div class="stat-card">
                    <h3 id="orderCount">0</h3>
                    <p>Orders</p>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-info" onclick="refreshStats()">🔄 Refresh Stats</button>
                <button class="btn-danger" onclick="clearAllData()">🗑️ Clear All Data</button>
            </div>
        </div>

        <!-- User Operations -->
        <div class="section">
            <h2>👤 User Operations</h2>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="userEmail" placeholder="artisan@example.com">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="userPassword" placeholder="Enter password">
            </div>
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="userFullName" placeholder="Priya Sharma">
            </div>
            
            <div class="form-group">
                <label>Role</label>
                <select id="userRole">
                    <option value="artisan">Artisan</option>
                    <option value="buyer">Buyer</option>
                    <option value="corporate">Corporate</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="createTestUser()">➕ Create User</button>
                <button class="btn-success" onclick="loginUser()">🔐 Login</button>
                <button class="btn-info" onclick="getAllUsers()">📋 List All Users</button>
            </div>

            <div class="output" id="userOutput"></div>
        </div>

        <!-- SkillScan Operations -->
        <div class="section">
            <h2>🎯 SkillScan Operations</h2>
            
            <div class="form-group">
                <label>Artisan ID</label>
                <input type="text" id="scanArtisanId" placeholder="ART123456">
            </div>
            
            <div class="form-group">
                <label>Skill Category</label>
                <select id="scanCategory">
                    <option value="embroidery">Embroidery</option>
                    <option value="cooking">Cooking</option>
                    <option value="henna">Henna</option>
                    <option value="crochet">Crochet</option>
                    <option value="tailoring">Tailoring</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Overall Score (0-100)</label>
                <input type="number" id="scanScore" min="0" max="100" value="75">
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="saveSkillScan()">💾 Save SkillScan</button>
                <button class="btn-info" onclick="getArtisanScans()">📊 Get Artisan Scans</button>
            </div>

            <div class="output" id="scanOutput"></div>
        </div>

        <!-- Product Operations -->
        <div class="section">
            <h2>🛍️ Product Operations</h2>
            
            <div class="form-group">
                <label>Product Title</label>
                <input type="text" id="productTitle" placeholder="Handmade Embroidered Saree">
            </div>
            
            <div class="form-group">
                <label>Category</label>
                <select id="productCategory">
                    <option value="textiles">Textiles</option>
                    <option value="food">Food</option>
                    <option value="crafts">Crafts</option>
                    <option value="services">Services</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="productPrice" min="0" value="2500">
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="createProduct()">➕ Create Product</button>
                <button class="btn-info" onclick="getAllProducts()">📋 List Products</button>
            </div>

            <div class="output" id="productOutput"></div>
        </div>

        <!-- Order Operations -->
        <div class="section">
            <h2>📦 Order Operations</h2>
            
            <div class="button-group">
                <button class="btn-primary" onclick="createTestOrder()">➕ Create Test Order</button>
                <button class="btn-info" onclick="getAllOrders()">📋 List Orders</button>
            </div>

            <div class="output" id="orderOutput"></div>
        </div>
    </div>

    <!-- Include Database Scripts -->
    <script src="db-config.js"></script>
    <script src="api-client.js"></script>

    <script>
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Database Integration Example loaded');
            refreshStats();
        });

        // Refresh statistics
        async function refreshStats() {
            try {
                const users = await db.query('users');
                const artisans = await db.query('artisanProfiles');
                const products = await db.query('products');
                const orders = await db.query('orders');

                document.getElementById('userCount').textContent = users.length;
                document.getElementById('artisanCount').textContent = artisans.length;
                document.getElementById('productCount').textContent = products.length;
                document.getElementById('orderCount').textContent = orders.length;

                showOutput('Database stats refreshed!', 'userOutput', 'success');
            } catch (error) {
                showOutput('Error refreshing stats: ' + error.message, 'userOutput', 'error');
            }
        }

        // Create test user
        async function createTestUser() {
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;
            const fullName = document.getElementById('userFullName').value;
            const role = document.getElementById('userRole').value;

            if (!email || !password || !fullName) {
                showOutput('Please fill in all fields', 'userOutput', 'error');
                return;
            }

            const result = await api.createUser({
                email,
                password,
                fullName,
                role
            });

            showOutput(JSON.stringify(result, null, 2), 'userOutput', result.success ? 'success' : 'error');
            if (result.success) refreshStats();
        }

        // Login user
        async function loginUser() {
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;

            const result = await api.login(email, password);
            showOutput(JSON.stringify(result, null, 2), 'userOutput', result.success ? 'success' : 'error');
        }

        // Get all users
        async function getAllUsers() {
            const users = await db.query('users');
            showOutput(JSON.stringify(users, null, 2), 'userOutput', 'info');
        }

        // Save SkillScan
        async function saveSkillScan() {
            const artisanId = document.getElementById('scanArtisanId').value;
            const category = document.getElementById('scanCategory').value;
            const score = parseInt(document.getElementById('scanScore').value);

            if (!artisanId) {
                showOutput('Please enter Artisan ID', 'scanOutput', 'error');
                return;
            }

            const skillLevel = score >= 80 ? 'Advanced' : score >= 60 ? 'Intermediate' : 'Beginner';

            const result = await api.saveSkillScanResult(artisanId, {
                category,
                overallScore: score,
                skillLevel,
                breakdown: {
                    'Technique': score + 5,
                    'Creativity': score - 5,
                    'Finishing': score
                },
                strengths: ['Good technique', 'Creative approach'],
                improvements: ['Practice more', 'Try advanced patterns']
            });

            showOutput(JSON.stringify(result, null, 2), 'scanOutput', result.success ? 'success' : 'error');
        }

        // Get artisan scans
        async function getArtisanScans() {
            const artisanId = document.getElementById('scanArtisanId').value;
            if (!artisanId) {
                showOutput('Please enter Artisan ID', 'scanOutput', 'error');
                return;
            }

            const scans = await db.query('skillScanResults', { artisan_id: artisanId });
            showOutput(JSON.stringify(scans, null, 2), 'scanOutput', 'info');
        }

        // Create product
        async function createProduct() {
            const title = document.getElementById('productTitle').value;
            const category = document.getElementById('productCategory').value;
            const price = parseFloat(document.getElementById('productPrice').value);

            if (!title) {
                showOutput('Please enter product title', 'productOutput', 'error');
                return;
            }

            // Get current user (artisan)
            const currentUser = api.getCurrentUser();
            if (!currentUser) {
                showOutput('Please login first', 'productOutput', 'error');
                return;
            }

            const productId = db.generateId('PRD');
            const result = await db.save('products', {
                product_id: productId,
                artisan_id: currentUser.userId,
                title,
                category,
                price,
                status: 'active',
                created_at: new Date().toISOString()
            }, productId);

            showOutput(JSON.stringify(result, null, 2), 'productOutput', result.success ? 'success' : 'error');
            if (result.success) refreshStats();
        }

        // Get all products
        async function getAllProducts() {
            const products = await db.query('products');
            showOutput(JSON.stringify(products, null, 2), 'productOutput', 'info');
        }

        // Create test order
        async function createTestOrder() {
            const orderId = db.generateId('ORD');
            const result = await db.save('orders', {
                order_id: orderId,
                buyer_id: 'BUY_TEST',
                artisan_id: 'ART_TEST',
                product_id: 'PRD_TEST',
                quantity: 1,
                unit_price: 2500,
                total_amount: 2500,
                status: 'pending',
                order_date: new Date().toISOString()
            }, orderId);

            showOutput(JSON.stringify(result, null, 2), 'orderOutput', result.success ? 'success' : 'error');
            if (result.success) refreshStats();
        }

        // Get all orders
        async function getAllOrders() {
            const orders = await db.query('orders');
            showOutput(JSON.stringify(orders, null, 2), 'orderOutput', 'info');
        }

        // Clear all data
        function clearAllData() {
            if (confirm('⚠️ This will delete ALL data from localStorage. Are you sure?')) {
                const keys = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith('shebalance_')) {
                        keys.push(key);
                    }
                }
                
                keys.forEach(key => localStorage.removeItem(key));
                
                showOutput('All data cleared!', 'userOutput', 'success');
                refreshStats();
            }
        }

        // Show output helper
        function showOutput(message, elementId, type = 'info') {
            const output = document.getElementById(elementId);
            const statusClass = type === 'success' ? 'success' : type === 'error' ? 'error' : 'info';
            output.innerHTML = `<pre><span class="status ${statusClass}">${type.toUpperCase()}</span>\n\n${message}</pre>`;
        }
    </script>
</body>
</html>
