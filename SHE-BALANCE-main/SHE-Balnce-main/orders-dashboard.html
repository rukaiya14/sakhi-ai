<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Dashboard - SHE-BALANCE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #F5F5DC 0%, #E8DCC4 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .header h1 { color: #5D4037; margin-bottom: 10px; }
        .header p { color: #8D6E63; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-card .icon { font-size: 40px; margin-bottom: 10px; }
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #5D4037;
            margin-bottom: 5px;
        }
        .stat-card .label { color: #8D6E63; font-size: 14px; }
        .section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .section h2 {
            color: #5D4037;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #8D6E63;
            background: white;
            color: #8D6E63;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn.active {
            background: #8D6E63;
            color: white;
        }
        .filter-btn:hover {
            background: #5D4037;
            border-color: #5D4037;
            color: white;
        }
        .orders-grid { display: grid; gap: 20px; }
        .order-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #8D6E63;
            transition: all 0.3s;
        }
        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .order-card.needs-reminder {
            border-left-color: #f44336;
            background: #FFEBEE;
        }
        .order-card.completed {
            border-left-color: #4CAF50;
            background: #E8F5E9;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        .order-title {
            font-size: 18px;
            font-weight: bold;
            color: #5D4037;
            margin-bottom: 5px;
        }
        .order-id {
            font-size: 12px;
            color: #999;
            font-family: monospace;
        }
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-badge.pending {
            background: #FFF3E0;
            color: #F57C00;
        }
        .status-badge.in_progress {
            background: #E3F2FD;
            color: #1976D2;
        }
        .status-badge.completed {
            background: #E8F5E9;
            color: #2E7D32;
        }
        .order-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .detail-item { display: flex; flex-direction: column; }
        .detail-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 3px;
        }
        .detail-value {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8D6E63, #5D4037);
            transition: width 0.3s;
        }
        .alert-banner {
            background: #FFEBEE;
            border-left: 4px solid #f44336;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-banner .icon { font-size: 24px; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8D6E63;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        button.refresh-btn {
            background: #8D6E63;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button.refresh-btn:hover { background: #5D4037; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Orders Dashboard</h1>
            <p>Monitor bulk orders and reminder status - Sample Data Loaded</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">📦</div>
                <div class="number" id="total-orders">0</div>
                <div class="label">Total Orders</div>
            </div>
            <div class="stat-card">
                <div class="icon">⚠️</div>
                <div class="number" id="needs-reminder">0</div>
                <div class="label">Needs Reminder</div>
            </div>
            <div class="stat-card">
                <div class="icon">🔄</div>
                <div class="number" id="in-progress">0</div>
                <div class="label">In Progress</div>
            </div>
            <div class="stat-card">
                <div class="icon">✅</div>
                <div class="number" id="completed">0</div>
                <div class="label">Completed</div>
            </div>
        </div>

        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>📋 All Orders</h2>
                <button class="refresh-btn" onclick="loadOrders()">
                    <span>🔄</span> Refresh
                </button>
            </div>

            <div class="filters">
                <button class="filter-btn active" onclick="filterOrders('all', event)">All Orders</button>
                <button class="filter-btn" onclick="filterOrders('needs-reminder', event)">Needs Reminder</button>
                <button class="filter-btn" onclick="filterOrders('in_progress', event)">In Progress</button>
                <button class="filter-btn" onclick="filterOrders('completed', event)">Completed</button>
                <button class="filter-btn" onclick="filterOrders('pending', event)">Pending</button>
            </div>

            <div id="orders-container" class="loading">Loading orders...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let allOrders = [];

        window.addEventListener('load', loadOrders);

        async function loadOrders() {
            try {
                const response = await fetch(\`\${API_BASE}/test/scan-orders\`);
                const data = await response.json();
                
                allOrders = data.orders || [];
                updateStatistics(allOrders);
                displayOrders(allOrders);
                
            } catch (error) {
                document.getElementById('orders-container').innerHTML = \`
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <h3>Error Loading Orders</h3>
                        <p>\${error.message}</p>
                        <p style="margin-top: 10px;">Make sure the backend server is running on port 5000</p>
                    </div>
                \`;
            }
        }

        function updateStatistics(orders) {
            const total = orders.length;
            const needsReminder = orders.filter(o => o.needsReminder).length;
            const inProgress = orders.filter(o => o.status === 'in_progress').length;
            const completed = orders.filter(o => o.status === 'completed').length;

            document.getElementById('total-orders').textContent = total;
            document.getElementById('needs-reminder').textContent = needsReminder;
            document.getElementById('in-progress').textContent = inProgress;
            document.getElementById('completed').textContent = completed;
        }

        function displayOrders(orders) {
            const container = document.getElementById('orders-container');
            
            if (orders.length === 0) {
                container.innerHTML = \`
                    <div class="empty-state">
                        <div class="icon">📦</div>
                        <h3>No Orders Found</h3>
                        <p>Sample data should have been created</p>
                    </div>
                \`;
                return;
            }

            container.innerHTML = '<div class="orders-grid">' + orders.map(order => \`
                <div class="order-card \${order.needsReminder ? 'needs-reminder' : ''} \${order.status === 'completed' ? 'completed' : ''}">
                    \${order.needsReminder ? \`
                        <div class="alert-banner">
                            <span class="icon">⚠️</span>
                            <div>
                                <strong>Reminder Needed!</strong>
                                <p style="margin: 0; font-size: 12px;">No progress update for \${order.daysSinceUpdate} days</p>
                            </div>
                        </div>
                    \` : ''}
                    
                    <div class="order-header">
                        <div>
                            <div class="order-title">\${order.title}</div>
                            <div class="order-id">\${order.orderId}</div>
                        </div>
                        <span class="status-badge \${order.status}">\${order.status.replace('_', ' ').toUpperCase()}</span>
                    </div>

                    <div class="order-details">
                        <div class="detail-item">
                            <span class="detail-label">Days Since Update</span>
                            <span class="detail-value">\${order.daysSinceUpdate} days</span>
                        </div>
                    </div>

                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 50%"></div>
                    </div>
                </div>
            \`).join('') + '</div>';
        }

        function filterOrders(filter, event) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            let filtered = allOrders;
            
            if (filter === 'needs-reminder') {
                filtered = allOrders.filter(o => o.needsReminder);
            } else if (filter === 'in_progress') {
                filtered = allOrders.filter(o => o.status === 'in_progress');
            } else if (filter === 'completed') {
                filtered = allOrders.filter(o => o.status === 'completed');
            } else if (filter === 'pending') {
                filtered = allOrders.filter(o => o.status === 'pending');
            }

            displayOrders(filtered);
        }
    </script>
</body>
</html>
